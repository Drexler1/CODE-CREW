<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied — Books &amp; Blooms Café</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --cream: #faf7f2; --gold: #b8924a; --ink: #1c1814; --muted: #7a6e62; }
        body { font-family: 'Outfit', sans-serif; background: var(--cream); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .card { max-width: 440px; }
        .code { font-size: 96px; font-weight: 600; color: var(--gold); line-height: 1; }
        h1 { font-size: 24px; font-weight: 500; color: var(--ink); margin: 12px 0 8px; }
        p { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
        a { display: inline-block; padding: 10px 28px; background: var(--ink); color: var(--cream);
            border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; }
        a:hover { background: var(--gold); }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">403</div>
        <h1>Access denied</h1>
        <p>You don't have permission to view this page. Please log in with an authorized account.</p>
        <a href="/">Back to login</a>
    </div>
</body>
</html>
