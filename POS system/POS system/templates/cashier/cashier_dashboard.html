<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books & Blooms Café - CASHIER</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a961;
            --dark-gold: #a88850;
            --black: #1a1a1a;
            --dark-gray: #2d2d2d;
            --light-gray: #f5f5f5;
            --cream: #faf8f4;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.15);
            --danger: #dc3545;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f0f0f0;
            color: var(--black);
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        /* Header */
        header {
            background: var(--black);
            border-bottom: 3px solid var(--gold);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 28px;
        }

        .logo-text h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            font-weight: 400;
            color: var(--white);
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .logo-text h1 span {
            color: var(--gold);
        }

        .logo-subtitle {
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Header right side */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--dark-gray);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            border: 1px solid rgba(201, 169, 97, 0.3);
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--black);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .user-details h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 2px;
        }

        .user-details p {
            font-size: 0.85rem;
            color: var(--gold);
        }

        /* Logout button — identical to Admin */
        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }

        /* Navigation */
        nav {
            background: var(--dark-gray);
            border-bottom: 1px solid rgba(201, 169, 97, 0.2);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 0;
            margin: 0;
            padding: 0;
        }

        nav li {
            flex: 1;
        }

        nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 1.1rem 0.5rem;
            text-decoration: none;
            color: #aaa;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
            text-align: center;
        }

        nav a:hover {
            background: rgba(201, 169, 97, 0.1);
            color: var(--gold);
        }

        nav a.active {
            color: var(--gold);
            background: rgba(201, 169, 97, 0.15);
            border-bottom-color: var(--gold);
        }

        .nav-icon {
            font-size: 1.5rem;
        }

        /* Main Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1.2fr 500px;
            gap: 1.5rem;
            padding: 1.5rem;
            min-height: calc(100vh - 180px);
        }

        /* Products Section */
        .products-section {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 2px 10px var(--shadow);
            border: 1px solid #e0e0e0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--black);
        }

        .search-bar {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .search-bar input {
            width: 100%;
            padding: 1.1rem 1.1rem 1.1rem 3.5rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.05rem;
            font-family: 'DM Sans', sans-serif;
            background: var(--light-gray);
            transition: all 0.2s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--gold);
            background: white;
        }

        .search-bar::before {
            content: '🔍';
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4rem;
        }

        .category-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 0.85rem 1.5rem;
            border: 2px solid var(--black);
            border-radius: 6px;
            background: white;
            color: var(--black);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .category-tab:hover {
            background: var(--light-gray);
            border-color: var(--dark-gold);
        }

        .category-tab.active {
            background: var(--black);
            color: var(--gold);
            border-color: var(--black);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
            max-height: 550px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .products-grid::-webkit-scrollbar { width: 10px; }
        .products-grid::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 10px; }
        .products-grid::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .product-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .product-card:hover {
            border-color: var(--gold);
            box-shadow: 0 4px 15px rgba(201, 169, 97, 0.25);
            transform: translateY(-3px);
        }

        .product-card:active { transform: translateY(0); }

        .product-image {
            width: 100%;
            height: 110px;
            background: var(--light-gray);
            border-radius: 6px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .product-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            color: var(--black);
            line-height: 1.3;
        }

        .product-price {
            color: var(--gold);
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 0.25rem;
        }

        .product-stock {
            font-size: 0.8rem;
            color: #666;
            font-weight: 500;
        }

        /* Cart Section */
        .cart-section {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 1.5rem;
            max-height: calc(100vh - 3rem);
            border: 1px solid #e0e0e0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--gold);
        }

        .cart-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--black);
        }

        .cart-count {
            background: var(--gold);
            color: var(--black);
            min-width: 40px;
            height: 40px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            padding: 0 0.75rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1.25rem;
            max-height: 320px;
        }

        .cart-items::-webkit-scrollbar { width: 8px; }
        .cart-items::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 10px; }
        .cart-items::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--light-gray);
            border-radius: 8px;
            margin-bottom: 0.75rem;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .cart-item:hover {
            border-color: var(--gold);
            background: white;
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            flex-shrink: 0;
            border: 1px solid #e0e0e0;
        }

        .cart-item-details {
            flex: 1;
            min-width: 0;
        }

        .cart-item-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
            color: var(--black);
        }

        .cart-item-price {
            color: var(--gold);
            font-weight: 800;
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
        }

        .cart-item-controls {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .qty-btn {
            min-width: 36px;
            height: 36px;
            border: none;
            background: var(--black);
            color: var(--gold);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover { background: var(--dark-gray); }
        .qty-btn:active { transform: scale(0.95); }

        .qty-display {
            min-width: 40px;
            text-align: center;
            font-weight: 800;
            font-size: 1.05rem;
            background: white;
            padding: 0.4rem;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .remove-btn {
            margin-left: auto;
            min-width: 36px;
            height: 36px;
            background: #fee;
            border: 2px solid var(--danger);
            color: var(--danger);
            cursor: pointer;
            border-radius: 6px;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn:hover {
            background: var(--danger);
            color: white;
        }

        .cart-summary {
            border-top: 2px solid #e0e0e0;
            padding-top: 1.25rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.9rem;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .summary-row.total {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--black);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 3px solid var(--gold);
        }

        .summary-row.total span:last-child { color: var(--gold); }

        .checkout-btn {
            width: 100%;
            padding: 1.4rem;
            background: var(--black);
            color: var(--gold);
            border: 2px solid var(--gold);
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .checkout-btn:hover:not(:disabled) {
            background: var(--gold);
            color: var(--black);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 169, 97, 0.4);
        }

        .checkout-btn:active:not(:disabled) { transform: translateY(0); }

        .checkout-btn:disabled {
            background: #ccc;
            border-color: #999;
            color: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .action-btn {
            padding: 1rem;
            background: white;
            border: 2px solid var(--black);
            color: var(--black);
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .action-btn:hover {
            background: var(--black);
            color: var(--gold);
        }

        .action-btn.clear-btn:hover {
            border-color: var(--danger);
            color: white;
            background: var(--danger);
        }

        /* Empty State */
        .empty-cart {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
            text-align: center;
        }

        .empty-cart-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.2;
        }

        .empty-cart p {
            color: #999;
            font-size: 1.05rem;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-content { grid-template-columns: 1fr; }
            .cart-section { position: relative; top: 0; max-height: none; }
        }

        @media (max-width: 768px) {
            header { padding: 1rem; }
            .logo-text h1 { font-size: 1.4rem; }
            .logo-subtitle { font-size: 0.6rem; letter-spacing: 2px; }
            .user-info { padding: 0.5rem 0.75rem; }
            nav ul { overflow-x: auto; }
            nav a { padding: 0.9rem 0.75rem; font-size: 0.75rem; }
            .nav-icon { font-size: 1.3rem; }
            .main-content { padding: 1rem; gap: 1rem; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .summary-row.total { font-size: 1.6rem; }
            .logout-btn { padding: 0.5rem 0.75rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">📚</div>
                <div class="logo-text">
                    <h1>Books <span>&</span> Blooms</h1>
                    <div class="logo-subtitle">CAFÉ</div>
                </div>
            </div>

            <!-- Header right: user info + logout -->
            <div class="header-actions">
                <div class="user-info">
                    <div class="user-details">
                        <h3>{{ employee.full_name }}</h3>
                        <p>Cashier</p>
                    </div>
                    <div class="user-avatar">{{ employee.full_name[0] }}</div>
                </div>
                <a href="{{ url_for('logout') }}" class="logout-btn">🚪 Logout</a>
            </div>
        </header>

        <nav>
            <ul>
                <li><a href="#" class="active"><span class="nav-icon">🏠</span> Home</a></li>
                <li><a href="#"><span class="nav-icon">📦</span> Products</a></li>
                <li><a href="#"><span class="nav-icon">👥</span> Customers</a></li>
                <li><a href="#"><span class="nav-icon">📊</span> Transactions</a></li>
                <li><a href="#"><span class="nav-icon">⚙️</span> Utility</a></li>
                <li><a href="#"><span class="nav-icon">👤</span> Account</a></li>
            </ul>
        </nav>

        <div class="main-content">
            <div class="products-section">
                <div class="search-bar">
                    <input type="text" placeholder="Search products..." id="searchInput">
                </div>

                <div class="category-tabs">
                    <button class="category-tab active">All Items</button>
                    <button class="category-tab">📚 Books</button>
                    <button class="category-tab">🌸 Flowers</button>
                    <button class="category-tab">☕ Café</button>
                    <button class="category-tab">📖 Stationery</button>
                </div>

                <div class="products-grid" id="productsGrid"></div>
            </div>

            <div class="cart-section">
                <div class="cart-header">
                    <h2>Current Order</h2>
                    <div class="cart-count">0</div>
                </div>

                <div class="cart-items" id="cartItems">
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p>Cart is empty<br>Add items to begin</p>
                    </div>
                </div>

                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₱0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (12%):</span>
                        <span id="tax">₱0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₱0.00</span>
                    </div>

                    <button class="checkout-btn" id="checkoutBtn" disabled>💳 Complete Sale</button>
                    <div class="action-buttons">
                        <button class="action-btn" id="holdBtn">⏸️ Hold Order</button>
                        <button class="action-btn clear-btn" id="clearBtn">🗑️ Clear All</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: 'The Great Gatsby', category: 'Books', price: 450, stock: 12, icon: '📕' },
            { id: 2, name: 'Rose Bouquet', category: 'Flowers', price: 850, stock: 8, icon: '🌹' },
            { id: 3, name: 'Cappuccino', category: 'Café', price: 150, stock: 50, icon: '☕' },
            { id: 4, name: 'Notebook Set', category: 'Stationery', price: 280, stock: 25, icon: '📓' },
            { id: 5, name: 'Pride & Prejudice', category: 'Books', price: 520, stock: 10, icon: '📗' },
            { id: 6, name: 'Tulip Bunch', category: 'Flowers', price: 680, stock: 6, icon: '🌷' },
            { id: 7, name: 'Croissant', category: 'Café', price: 120, stock: 30, icon: '🥐' },
            { id: 8, name: 'Gift Basket', category: 'Gifts', price: 1500, stock: 5, icon: '🎁' },
            { id: 9, name: 'Latte', category: 'Café', price: 140, stock: 50, icon: '☕' },
            { id: 10, name: '1984 by Orwell', category: 'Books', price: 480, stock: 14, icon: '📘' },
            { id: 11, name: 'Sunflower Bouquet', category: 'Flowers', price: 720, stock: 11, icon: '🌻' },
            { id: 12, name: 'Bookmark Set', category: 'Stationery', price: 150, stock: 30, icon: '🔖' },
            { id: 13, name: 'Espresso', category: 'Café', price: 100, stock: 50, icon: '☕' },
            { id: 14, name: 'Book Light', category: 'Gifts', price: 450, stock: 15, icon: '💡' },
            { id: 15, name: 'Fountain Pen', category: 'Stationery', price: 1200, stock: 7, icon: '🖊️' },
        ];

        let cart = [];

        function renderProducts(filterCategory = 'All Items') {
            const grid = document.getElementById('productsGrid');
            const filtered = filterCategory === 'All Items'
                ? products
                : products.filter(p => p.category === filterCategory);

            grid.innerHTML = filtered.map(product => `
                <div class="product-card" onclick="addToCart(${product.id})">
                    <div class="product-image">${product.icon}</div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">₱${product.price.toFixed(2)}</div>
                    <div class="product-stock">Stock: ${product.stock}</div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                if (existingItem.quantity < product.stock) existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
        }

        function updateCart() {
            const cartItemsContainer = document.getElementById('cartItems');
            const cartCount = document.querySelector('.cart-count');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p>Cart is empty<br>Add items to begin</p>
                    </div>`;
                checkoutBtn.disabled = true;
            } else {
                cartItemsContainer.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <div class="cart-item-image">${item.icon}</div>
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">₱${item.price.toFixed(2)}</div>
                            <div class="cart-item-controls">
                                <button class="qty-btn" onclick="updateQuantity(${index}, -1)">−</button>
                                <span class="qty-display">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                                <button class="remove-btn" onclick="removeItem(${index})">🗑️</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                checkoutBtn.disabled = false;
            }

            cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            updateSummary();
        }

        function updateSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.12;
            document.getElementById('subtotal').textContent = `₱${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `₱${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `₱${(subtotal + tax).toFixed(2)}`;
        }

        function updateQuantity(index, change) {
            const item = cart[index];
            const product = products.find(p => p.id === item.id);
            item.quantity += change;
            if (item.quantity <= 0) cart.splice(index, 1);
            else if (item.quantity > product.stock) item.quantity = product.stock;
            updateCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCart();
        }

        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderProducts(this.textContent.trim());
            });
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = products.filter(p =>
                p.name.toLowerCase().includes(term) || p.category.toLowerCase().includes(term)
            );
            document.getElementById('productsGrid').innerHTML = filtered.map(product => `
                <div class="product-card" onclick="addToCart(${product.id})">
                    <div class="product-image">${product.icon}</div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">₱${product.price.toFixed(2)}</div>
                    <div class="product-stock">Stock: ${product.stock}</div>
                </div>
            `).join('');
        });

        document.getElementById('checkoutBtn').addEventListener('click', function() {
            if (cart.length > 0) {
                alert(`Processing payment of ${document.getElementById('total').textContent}\n\nThank you for visiting Books & Blooms Café!`);
                cart = [];
                updateCart();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            if (cart.length > 0 && confirm('Clear all items from cart?')) {
                cart = [];
                updateCart();
            }
        });

        document.getElementById('holdBtn').addEventListener('click', function() {
            if (cart.length > 0) {
                alert('Order has been held. You can retrieve it later.');
                cart = [];
                updateCart();
            }
        });

        renderProducts();
    </script>
</body>
</html>
